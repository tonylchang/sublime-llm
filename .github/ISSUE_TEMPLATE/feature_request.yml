name: Feature request
description: Suggest a new capability or improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: summary
    attributes:
      label: What would you like to see?
      description: One or two sentences describing the feature.
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Why is this useful?
      description: What's the problem this solves, or the workflow it enables? Real examples help.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered
      description: Other ways you've thought about solving the same problem, including workarounds you currently use.

  - type: textarea
    id: additional
    attributes:
      label: Anything else?
      description: Mockups, links to similar features in other plugins, references to relevant API docs.
